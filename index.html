<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Presensi Sekolah Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .bg-pattern { background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 24px 24px; }
        input::placeholder { font-size: 0.875rem; }
    </style>
</head>
<body class="bg-pattern min-h-screen font-sans text-gray-800 antialiased">

    <!-- Kontainer Utama -->
    <div id="app" class="max-w-md mx-auto md:max-w-4xl p-4 sm:p-6">
        
        <!-- Bagian Login -->
        <div id="loginSection" class="mt-12 sm:mt-24 glass p-6 sm:p-10 rounded-3xl shadow-xl border border-white max-w-sm mx-auto">
            <div class="text-center mb-6">
                <div class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center shadow-md mb-4">
                    <i class="fas fa-school text-white text-2xl"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">E-Presensi</h1>
                <p class="text-xs text-gray-500 mt-1">Sistem Kehadiran Digital</p>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1 ml-1">Username</label>
                    <input type="text" id="username" class="w-full p-3 text-sm rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-white/50" placeholder="Username Anda" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1 ml-1">Password</label>
                    <input type="password" id="password" class="w-full p-3 text-sm rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all bg-white/50" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition-all active:scale-95 text-sm">
                    Masuk
                </button>
            </form>
            
            <!-- Inisialisasi Database -->
            <div class="mt-6 pt-5 border-t border-gray-100">
                <button id="btnInit" class="text-xs text-gray-400 hover:text-blue-600 flex items-center justify-center w-full transition-colors">
                    <i class="fas fa-cog mr-2"></i> Konfigurasi Database Awal
                </button>
            </div>
        </div>

        <!-- Dashboard (Hidden by default) -->
        <div id="dashboardSection" class="hidden space-y-4">
            <nav class="glass p-3 sm:p-4 rounded-2xl shadow-sm flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500 p-2 rounded-xl text-white shadow-sm">
                        <i class="fas fa-user-circle text-lg"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest leading-none mb-1" id="userRole">Wali Kelas</p>
                        <p class="text-sm font-bold text-gray-800" id="userNameDisplay">Memuat...</p>
                    </div>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500 p-2 rounded-xl transition-all">
                    <i class="fas fa-power-off text-lg"></i>
                </button>
            </nav>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4" id="menuGrid">
                <!-- Menu akan di-render secara dinamis berdasarkan role -->
            </div>
        </div>

    </div>

    <!-- Script Utama -->
    <script>
        const API_URL = "https://script.google.com/a/macros/guru.smp.belajar.id/s/AKfycbwgdqfLgGdiGZkeDvIty4UCrkKRgQCZfhomKHyMpUEpXPLzAGwLrAGBMSnRqpx--E6a/exec"; 

        document.getElementById('btnInit').addEventListener('click', async () => {
            const status = confirm("Sistem akan mencoba membuat file Spreadsheet baru di Google Drive Anda. Lanjutkan?");
            if (!status) return;
            alert("Memanggil fungsi inisialisasi di Apps Script...");
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const userDisp = document.getElementById('userNameDisplay');
            
            userDisp.innerText = user.charAt(0).toUpperCase() + user.slice(1);
            
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            renderDashboard(user === 'admin' ? 'admin' : 'wali_kelas');
        });

        function renderDashboard(role) {
            const grid = document.getElementById('menuGrid');
            const userRoleText = document.getElementById('userRole');
            grid.innerHTML = '';

            const menus = [
                { title: 'Absensi', icon: 'fa-calendar-check', role: ['admin', 'wali_kelas'], color: 'bg-emerald-500' },
                { title: 'Murid', icon: 'fa-user-graduate', role: ['admin', 'wali_kelas'], color: 'bg-sky-500' },
                { title: 'Laporan', icon: 'fa-file-alt', role: ['admin', 'wali_kelas'], color: 'bg-violet-500' },
                { title: 'Kelas', icon: 'fa-chalkboard', role: ['admin'], color: 'bg-amber-500' },
                { title: 'Guru', icon: 'fa-user-tie', role: ['admin'], color: 'bg-indigo-500' },
                { title: 'Libur', icon: 'fa-calendar-day', role: ['admin'], color: 'bg-rose-500' },
                { title: 'Setelan', icon: 'fa-sliders-h', role: ['admin'], color: 'bg-slate-600' }
            ];

            userRoleText.innerText = role;

            menus.filter(m => m.role.includes(role)).forEach(m => {
                grid.innerHTML += `
                    <div class="glass p-5 rounded-3xl border border-white hover:border-blue-200 hover:shadow-md transition-all cursor-pointer group flex flex-col items-center text-center">
                        <div class="${m.color} w-10 h-10 rounded-xl flex items-center justify-center text-white mb-3 shadow-sm group-hover:scale-110 transition-transform">
                            <i class="fas ${m.icon} text-sm"></i>
                        </div>
                        <h3 class="font-bold text-xs sm:text-sm text-gray-700">${m.title}</h3>
                    </div>
                `;
            });
        }

        function logout() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
